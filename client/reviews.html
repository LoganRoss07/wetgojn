<!DOCTYPE html>
<html>
  <head>
    <title>Reviews</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

   <body class="bg-dark text-light">
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
      
      <ul class="navbar-nav mx-auto flex-row">

        <li class="nav-item">
          <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="movies.html">Movies</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="reviews.html">Reviews</a>
        </li>

      </ul>
      
      <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

     <div class="container mt-4">

       <h3>Reviews</h3>

         <div class="section-card mb-4 bg-secondary">
        <h5>Review Statistics</h5>

        <div class="row mt-3">
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center">
              Pending Reviews
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center">
              Approved Reviews
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center">
              Rejected Reviews
            </div>
          </div>
            
        </div>
    </div>

       <div class="section-card mb-4 bg-secondary">
         <h5>Filter Reviews</h5>

         <div class="d-flex justify-content-between mt-3">
           <button class="btn btn-dark">All</button>
           <button class="btn btn-dark">Pending</button>
           <button class="btn btn-dark">Approved</button>
           <button class="btn btn-dark">Rejected</button>
         </div>
       </div>

       <div class="section-card bg-secondary">
         <h5 class="mb-3">Review List</h5>
         
       <div class="review-card mb-3">
         <div class="d-flex justify-content-between">
           <div>
             <strong>Movie Title</strong><br>
             <small>Username</small><br>
             <small>Rating: 7/10</small>
           </div>
           <div class="text-warning">
             Pending
           </div>
         </div>

         <div class="mt-3">
           <input type="text" class="form-control" value="this movie was insane" readonly>
         </div>

         <div class="mt-3">
           <button class="btn btn-success btn-sm">Approve</button>
           <button class="btn btn-danger btn-sm">Reject</button>
         </div>
       </div>

        <div class="review-card mb-3">
         <div class="d-flex justify-content-between">
           <div>
             <strong>Movie Title</strong><br>
             <small>Username</small><br>
             <small>Rating: 5/10</small>
           </div>
           <div class="text-warning">
             Pending
           </div>
         </div>

         <div class="mt-3">
           <input type="text" class="form-control" value="this movie was fine" readonly>
         </div>

         <div class="mt-3">
           <button class="btn btn-success btn-sm">Approve</button>
           <button class="btn btn-danger btn-sm">Reject</button>
         </div>
       </div>

        <div class="review-card mb-3">
         <div class="d-flex justify-content-between">
           <div>
             <strong>Movie Title</strong><br>
             <small>Username</small><br>
             <small>Rating: 1/10</small>
           </div>
           <div class="text-warning">
             Pending
           </div>
         </div>

         <div class="mt-3">
           <input type="text" class="form-control" value="this movie was so bad" readonly>
         </div>

         <div class="mt-3">
           <button class="btn btn-success btn-sm">Approve</button>
           <button class="btn btn-danger btn-sm">Reject</button>
         </div>
       </div>
     </div>
   </body>
</html>
